job:
  enabled: true

image:
  repository: registry.access.redhat.com/ubi9/python-312
  tag: latest
  pullPolicy: IfNotPresent

packageSpec: ""
evalhubSdkSpec: "eval-hub-sdk[client]==0.1.5"

quickstart:
  fixture: first-line-support
  benchmarks: humanity
  uniqueRun: false
  runSuffix: ""
  evalhubReadyTimeoutSeconds: "600"
  mlflowReadyTimeoutSeconds: "600"
  waitForMlflow: ""

evalhub:
  baseUrl: ""
  authToken: ""
  existingSecret: ""
  authTokenKey: "EVALHUB_AUTH_TOKEN"
  tenant: ""
  insecure: "true"
  experimentName: "gaussia-agent-evaluation"

evaluatedModel:
  name: ""
  url: ""

platform:
  enabled: true
  serviceAccountName: ""
  mlflow:
    enabled: true
    create: true
    name: "mlflow"
    # Required by MLflow CR validation (OpenShift AI 3.4+).
    backendStoreUri: "sqlite:////mlflow/mlflow.db"
    artifactsDestination: "file:///mlflow/artifacts"
    serveArtifacts: true
    trackingUri: ""
    trackingToken: ""
    workspace: ""
    rbacNamespace: ""
    insecureSkipVerify: true
    serviceAlias:
      enabled: false
      externalName: ""
    storage:
      storageClassName: ""
      size: 10Gi
    route:
      enabled: true
  evalhub:
    enabled: true
    name: ""
    image:
      fullReference: "docker.io/alquimiaai/eval-hub@sha256:087b97a10e47f2795b50f0a26b5361f2ac968dd4ff4ebb259399d0d4b0a5b12f"
      repository: docker.io/alquimiaai/eval-hub
      tag: latest
      pullPolicy: IfNotPresent
    route:
      enabled: true
    database:
      url: "file:/tmp/evalhub.db?cache=shared"
    resources:
      requests:
        cpu: 500m
        memory: 1Gi
      limits:
        cpu: 2000m
        memory: 2Gi
  provider:
    enabled: true
    id: gaussia
    title: Gaussia
    image:
      fullReference: "docker.io/alquimiaai/gaussia-provider@sha256:fd12fc7f463fdea27e1f510be8f7ce8686873b183a2e789a54bc47b78d8e7cd7"
      repository: docker.io/alquimiaai/gaussia-provider
      tag: 1.1.0b2
      pullPolicy: IfNotPresent
    packageSpec: "gaussia[evalhub]==1.1.0b2 langchain-openai"
    evalhubSdkSpec: "eval-hub-sdk[adapter]==0.1.5"
    cacheRoot: /tmp/gaussia-cache
    # Chart creates a Secret from judge/guardian apiKey unless existingSecret is set.
    existingSecret: ""
    judgeApiKeyKey: GAUSSIA_JUDGE_API_KEY
    guardianApiKeyKey: GAUSSIA_GUARDIAN_API_KEY
    resources:
      requests:
        cpu: 500m
        memory: 2Gi
      limits:
        cpu: 4000m
        memory: 12Gi
    judge:
      model: ""
      modelProvider: ""
      apiKey: ""
      baseUrl: ""
      temperature: "0.0"
      useStructuredOutput: "true"
      bosJsonClause: ""
      eosJsonClause: ""
    agentic:
      k: "3"
      threshold: "0.7"
      toolThreshold: "1.0"
    guardian:
      model: ""
      tokenizerModel: ""
      apiKey: ""
      baseUrl: ""
      temperature: "0.01"
      logprobs: "false"
      chatCompletions: "false"
    toxicity:
      embeddingModel: "all-MiniLM-L6-v2"
      statisticalMode: "frequentist"

serviceAccount:
  create: true
  name: ""

resources:
  requests:
    cpu: "2"
    memory: "4Gi"
  limits:
    cpu: "4"
    memory: "8Gi"

mlflow:
  # This will create the MLflow CR if enabled.
  # This will always be deployed int he redhat-ods-applications namespace 
  # regardless of the namespace of the chart if using ODH 3.4+.
  create: true
  serviceName: "mlflow"
  storage:
    storageClassName: ""
    size: 10Gi
    artifactsDestination: "file:///mlflow/artifacts"
    backendStoreUri: "sqlite:////mlflow/mlflow.db"
    serveArtifacts: true


ui:
  enabled: true
  replicaCount: 1
  name: gaussia-ui
  image:
    repository: quay.io/rh-ai-quickstart/alquimia-streamlit-ui
    tag: "0.1.0"
    pullPolicy: Always
  # Created by the chart unless existingEnvConfigMap is set.
  envConfigMap: ""
  existingEnvConfigMap: ""
  serviceAccount:
    create: true
    name: ocp-api-edit
  route:
    enabled: true
  service:
    port: 8501

extraEnv: {}
podAnnotations: {}
nodeSelector: {}
tolerations: []
affinity: {}
