{{- if and .Values.platform.provider.enabled (not .Values.platform.provider.existingSecret) (or .Values.platform.provider.judge.apiKey .Values.platform.provider.guardian.apiKey) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "gaussia-evalhub.providerSecretName" . }}
  labels:
    {{- include "gaussia-evalhub.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{ .Values.platform.provider.judgeApiKeyKey | default "GAUSSIA_JUDGE_API_KEY" }}: {{ .Values.platform.provider.judge.apiKey | default "" | quote }}
  {{ .Values.platform.provider.guardianApiKeyKey | default "GAUSSIA_GUARDIAN_API_KEY" }}: {{ .Values.platform.provider.guardian.apiKey | default "" | quote }}
{{- end }}
