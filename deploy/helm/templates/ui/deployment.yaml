{{- if .Values.ui.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "gaussia-evalhub.uiName" . }}
  labels:
    {{- include "gaussia-evalhub.uiLabels" . | nindent 4 }}
spec:
  progressDeadlineSeconds: 600
  replicas: {{ .Values.ui.replicaCount }}
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      deployment: {{ include "gaussia-evalhub.uiName" . }}
  strategy:
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
    type: RollingUpdate
  template:
    metadata:
      labels:
        deployment: {{ include "gaussia-evalhub.uiName" . }}
        {{- include "gaussia-evalhub.uiLabels" . | nindent 8 }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/ui/configmap.yaml") . | sha256sum }}
    spec:
      serviceAccountName: {{ include "gaussia-evalhub.uiServiceAccountName" . }}
      containers:
        - name: {{ include "gaussia-evalhub.uiName" . }}
          image: {{ include "gaussia-evalhub.uiImage" . | quote }}
          imagePullPolicy: {{ .Values.ui.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.ui.service.port }}
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "gaussia-evalhub.uiEnvConfigMapName" . }}
          resources: {}
          terminationMessagePath: /dev/termination-log
          terminationMessagePolicy: File
      dnsPolicy: ClusterFirst
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
{{- end }}
