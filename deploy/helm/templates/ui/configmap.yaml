{{- if and .Values.ui.enabled (not .Values.ui.existingEnvConfigMap) }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "gaussia-evalhub.uiEnvConfigMapName" . }}
  labels:
    {{- include "gaussia-evalhub.uiLabels" . | nindent 4 }}
data:
  EVALHUB_BASE_URL: {{ include "gaussia-evalhub.evalhubBaseUrl" . | quote }}
  EVALHUB_AUTH_TOKEN: {{ .Values.evalhub.authToken | default "" | quote }}
  EVALHUB_TENANT: {{ include "gaussia-evalhub.evalhubTenant" . | quote }}
  EVALHUB_INSECURE: {{ .Values.evalhub.insecure | default "true" | quote }}
  EVALHUB_EXPERIMENT_NAME: {{ .Values.evalhub.experimentName | default "gaussia-agent-evaluation" | quote }}
  MLFLOW_TRACKING_URI: {{ include "gaussia-evalhub.mlflowTrackingUri" . | quote }}
  MLFLOW_TRACKING_TOKEN: {{ .Values.platform.mlflow.trackingToken | default "" | quote }}
  MLFLOW_WORKSPACE: {{ include "gaussia-evalhub.mlflowWorkspace" . | quote }}
  GAUSSIA_JUDGE_MODEL: {{ .Values.platform.provider.judge.model | default "" | quote }}
  GAUSSIA_JUDGE_MODEL_PROVIDER: {{ .Values.platform.provider.judge.modelProvider | default "" | quote }}
  GAUSSIA_JUDGE_API_KEY: {{ .Values.platform.provider.judge.apiKey | default "" | quote }}
  GAUSSIA_JUDGE_BASE_URL: {{ .Values.platform.provider.judge.baseUrl | default "" | quote }}
  GAUSSIA_JUDGE_TEMPERATURE: {{ .Values.platform.provider.judge.temperature | default "0.0" | quote }}
  GAUSSIA_JUDGE_USE_STRUCTURED_OUTPUT: {{ .Values.platform.provider.judge.useStructuredOutput | default "true" | quote }}
  GAUSSIA_JUDGE_BOS_JSON_CLAUSE: {{ .Values.platform.provider.judge.bosJsonClause | default "" | quote }}
  GAUSSIA_JUDGE_EOS_JSON_CLAUSE: {{ .Values.platform.provider.judge.eosJsonClause | default "" | quote }}
  GAUSSIA_GUARDIAN_MODEL: {{ .Values.platform.provider.guardian.model | default "" | quote }}
  GAUSSIA_GUARDIAN_TOKENIZER_MODEL: {{ .Values.platform.provider.guardian.tokenizerModel | default "" | quote }}
  GAUSSIA_GUARDIAN_API_KEY: {{ .Values.platform.provider.guardian.apiKey | default "" | quote }}
  GAUSSIA_GUARDIAN_BASE_URL: {{ .Values.platform.provider.guardian.baseUrl | default "" | quote }}
  GAUSSIA_GUARDIAN_TEMPERATURE: {{ .Values.platform.provider.guardian.temperature | default "0.01" | quote }}
  GAUSSIA_GUARDIAN_LOGPROBS: {{ .Values.platform.provider.guardian.logprobs | default "false" | quote }}
  GAUSSIA_GUARDIAN_CHAT_COMPLETIONS: {{ .Values.platform.provider.guardian.chatCompletions | default "false" | quote }}
  GAUSSIA_AGENTIC_K: {{ .Values.platform.provider.agentic.k | default "3" | quote }}
  GAUSSIA_AGENTIC_THRESHOLD: {{ .Values.platform.provider.agentic.threshold | default "0.7" | quote }}
  GAUSSIA_AGENTIC_TOOL_THRESHOLD: {{ .Values.platform.provider.agentic.toolThreshold | default "1.0" | quote }}
  GAUSSIA_TOXICITY_EMBEDDING_MODEL: {{ .Values.platform.provider.toxicity.embeddingModel | default "all-MiniLM-L6-v2" | quote }}
  GAUSSIA_TOXICITY_STATISTICAL_MODE: {{ .Values.platform.provider.toxicity.statisticalMode | default "frequentist" | quote }}
  GAUSSIA_PROVIDER_PACKAGE_SPEC: {{ .Values.platform.provider.packageSpec | default "" | quote }}
{{- end }}
