{{- if .Values.ui.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "gaussia-evalhub.uiName" . }}
  labels:
    {{- include "gaussia-evalhub.uiLabels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - name: http
      port: {{ .Values.ui.service.port }}
      protocol: TCP
      targetPort: http
  selector:
    deployment: {{ include "gaussia-evalhub.uiName" . }}
{{- end }}
