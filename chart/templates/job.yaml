apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "gaussia-evalhub.fullname" . }}-{{ .Values.mode }}
  labels:
    {{- include "gaussia-evalhub.labels" . | nindent 4 }}
spec:
  backoffLimit: 0
  template:
    metadata:
      labels:
        {{- include "gaussia-evalhub.labels" . | nindent 8 }}
      annotations:
        {{- toYaml .Values.podAnnotations | nindent 8 }}
    spec:
      restartPolicy: Never
      serviceAccountName: {{ include "gaussia-evalhub.serviceAccountName" . }}
      containers:
        - name: quickstart
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - /bin/bash
            - -lc
          args:
            - |
              python -m pip install --no-cache-dir "${GAUSSIA_PACKAGE_SPEC}" "${EVALHUB_SDK_SPEC}"
              python /quickstart/run_quickstart.py
          env:
            - name: GAUSSIA_PACKAGE_SPEC
              value: {{ .Values.packageSpec | quote }}
            - name: EVALHUB_SDK_SPEC
              value: {{ .Values.evalhubSdkSpec | quote }}
            - name: QUICKSTART_MODE
              value: {{ .Values.mode | quote }}
            - name: QUICKSTART_FIXTURE_PATH
              value: "/quickstart/agent_transcript_{{ .Values.quickstart.fixture }}.json"
            - name: QUICKSTART_BENCHMARKS
              value: {{ .Values.quickstart.benchmarks | quote }}
            - name: QUICKSTART_UNIQUE_RUN
              value: {{ .Values.quickstart.uniqueRun | quote }}
            - name: QUICKSTART_RUN_SUFFIX
              value: {{ .Values.quickstart.runSuffix | quote }}
            - name: QUICKSTART_EVALHUB_READY_TIMEOUT_SECONDS
              value: {{ .Values.quickstart.evalhubReadyTimeoutSeconds | quote }}
            - name: QUICKSTART_WAIT_FOR_MLFLOW
              value: {{ (and .Values.platform.enabled .Values.platform.mlflow.enabled) | quote }}
            - name: QUICKSTART_MLFLOW_READY_TIMEOUT_SECONDS
              value: {{ .Values.quickstart.mlflowReadyTimeoutSeconds | quote }}
            - name: EVALHUB_BASE_URL
              value: {{ include "gaussia-evalhub.evalhubBaseUrl" . | quote }}
            - name: EVALHUB_TENANT
              value: {{ include "gaussia-evalhub.evalhubTenant" . | quote }}
            - name: EVALHUB_INSECURE
              value: {{ .Values.evalhub.insecure | quote }}
            - name: EVALHUB_EXPERIMENT_NAME
              value: {{ .Values.evalhub.experimentName | quote }}
            - name: MLFLOW_TRACKING_URI
              value: {{ include "gaussia-evalhub.mlflowTrackingUri" . | quote }}
            - name: GAUSSIA_EVALUATED_MODEL_NAME
              value: {{ .Values.evaluatedModel.name | quote }}
            - name: GAUSSIA_EVALUATED_MODEL_URL
              value: {{ .Values.evaluatedModel.url | quote }}
            {{- if .Values.evalhub.existingSecret }}
            - name: EVALHUB_AUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.evalhub.existingSecret | quote }}
                  key: {{ .Values.evalhub.authTokenKey | quote }}
            {{- else if .Values.evalhub.authToken }}
            - name: EVALHUB_AUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "gaussia-evalhub.fullname" . }}-evalhub
                  key: EVALHUB_AUTH_TOKEN
            {{- end }}
            {{- range $key, $value := .Values.extraEnv }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: quickstart-files
              mountPath: /quickstart
              readOnly: true
      volumes:
        - name: quickstart-files
          configMap:
            name: {{ include "gaussia-evalhub.fullname" . }}-quickstart
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
